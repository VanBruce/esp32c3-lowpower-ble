name: build

# Proves the template still compiles against the pinned pioarduino platform —
# catches a broken custom_sdkconfig symbol or a moved IDF header before users do.
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The platform download + IDF recompile is slow; cache it across runs.
      - uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Install PlatformIO
        # Pin click < 8.2: the esptool bundled with this platform release calls
        # the old ParamType.get_metavar() (no ctx arg), which click 8.2 removed,
        # so bin generation dies with a TypeError. 8.1.x keeps esptool working.
        run: pip install platformio "click<8.2"

      - name: Build
        run: |
          cp src/secrets.h.example src/secrets.h   # secrets.h is gitignored
          pio run
