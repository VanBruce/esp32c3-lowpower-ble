; Reliable sub-mA BLE peripheral on ESP32-C3 (Arduino/NimBLE).
;
;   pio run            -> build
;   pio run -t upload  -> flash
;   pio device monitor -> serial debug (USB CDC)
;
; THE WHOLE POINT of this file: stock Arduino-ESP32 ships with power management
; OFF (esp_pm_configure() returns ESP_ERR_NOT_SUPPORTED at runtime), so a NimBLE
; peripheral sits at ~40 mA forever. The Arduino IDE/CLI build flow CANNOT turn
; PM on — it doesn't expose sdkconfig. The community "pioarduino" platform can:
; `custom_sdkconfig` recompiles the ESP-IDF libraries with our deltas while
; keeping the normal Arduino build (correct esp32c3 variant, BT already enabled).
; That recompile is what enables light sleep + BT modem sleep -> ~0.15 mA idle on
; a HELD BLE connection. This is why the project is pioarduino, not Arduino IDE.
;
; `54.03.21` = pinned pioarduino release; bump from
; https://github.com/pioarduino/platform-espressif32/releases for newer IDF.

[env:esp32-c3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21/platform-espressif32.zip
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
; 4MB flash + default partitions (board defaults). App + BLE fits easily.

lib_deps =
    h2zero/NimBLE-Arduino @ ^2.1

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1          ; Serial -> native USB CDC (debug)

; Strip unused Arduino bundled components. We only need NimBLE + NVS. Removing
; these (a) kills the esp_https_server cert-embedding build bug pulled in by
; Insights/RainMaker, and (b) makes the IDF lib rebuild far faster/smaller.
custom_component_remove =
    espressif/network_provisioning
    espressif/esp-zboss-lib
    espressif/esp-zigbee-lib
    espressif/esp_rainmaker
    espressif/rmaker_common
    espressif/esp_insights
    espressif/esp_diag_data_store
    espressif/esp_diagnostics
    espressif/cbor
    espressif/qrcode
    espressif/esp-sr
    espressif/libsodium
    espressif/esp-modbus
    chmorgan/esp-libhelix-mp3
    espressif/esp32-camera

; ESP-IDF config deltas applied on top of Arduino's base (pioarduino hybrid).
; Only the power-management options — Arduino already sets BT, FREERTOS_HZ, etc.
; If a symbol name is wrong for this IDF version the build warns; check via
; `pio run -t menuconfig`.
custom_sdkconfig =
    CONFIG_PM_ENABLE=y
    CONFIG_FREERTOS_USE_TICKLESS_IDLE=y
    CONFIG_FREERTOS_IDLE_TIME_BEFORE_SLEEP=3
    CONFIG_PM_DFS_INIT_AUTO=y
    CONFIG_ESP_PHY_MAC_BB_PD=y
    ; BLE controller modem sleep on the external 32.768kHz crystal (must be
    ; fitted — see HARDWARE in README). The crystal is precise enough for a HELD
    ; connection, so this enables the WARM-link design: sub-mA idle AND a held
    ; connection (no per-command reconnect latency).
    ;   No crystal? Use the RC fallback instead (see README "No crystal?"):
    ;   drop the two RTC_CLK lines below and the BT_CTRL_LPCLK line, and set
    ;   CONFIG_RTC_CLK_SRC_INT_RC=y + CONFIG_BT_CTRL_LPCLK_SEL_RTC_SLOW=y.
    CONFIG_RTC_CLK_SRC_EXT_CRYS=y
    ; 32k crystals start SLOWLY; the calibration window must be long enough or
    ; IDF declares the crystal dead and falls back to internal RC (~149kHz).
    ; Arduino's base value (576) is too short — use a high value (max 8190) so
    ; the crystal has time to launch. This is the fix for "crystal won't start".
    CONFIG_RTC_CLK_CAL_CYCLES=8000
    ; Kick-start the crystal: drive XTAL_32K_P with a 32kHz square wave for N
    ; cycles so it launches FAST. Default on the C3 is 0 (disabled) — which is why
    ; the crystal usually didn't restart within the calibration window after a
    ; RESET (reset power-cycles the RTC oscillator -> cold restart -> too slow),
    ; so the BLE controller (pinned to this crystal) failed to init and the chip
    ; never reached setup(): no serial, no advertising ~9/10 boots. Maxed here
    ; (32768 cycles = ~1s of kick-start); the ~1s extra boot delay is usually
    ; fine. Only downside of a high value: a MARGINAL crystal can start then quit
    ; later — symptom is the warm link randomly dropping in operation. If that
    ; happens, back off (try 4096). A healthy crystal is unaffected.
    CONFIG_ESP_SYSTEM_RTC_EXT_XTAL_BOOTSTRAP_CYCLES=32768
    CONFIG_BT_CTRL_MODEM_SLEEP=y
    CONFIG_BT_CTRL_MODEM_SLEEP_MODE_1=y
    CONFIG_BT_CTRL_LPCLK_SEL_EXT_32K_XTAL=y
